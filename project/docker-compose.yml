version: '3'

services:

  front-end-service:
    build:
      context: ./../front-end
      dockerfile: ./../front-end/front-end-service.dockerfile
    restart: always
    ports:
      - "3000:80"
    deploy:
      mode: replicated
      replicas: 1
    environment:
      TENANT_URL: "https://api.quarantio.app"

  mail-service:
    build:
      context: ./../mail-service
      dockerfile: ./../mail-service/mail-service.dockerfile
    restart: always
    deploy:
      mode: replicated
      replicas: 1
    environment:
      BREVO_API_KEY: "${BREVO_API_KEY}"
      FROM_NAME: "Quarantio"
      FROM_ADDRESS: "quarantio8@gmail.com"

  tenant-service:
    build:
      context: ./../tenant-service
      dockerfile: ./../tenant-service/tenant-service.dockerfile
    restart: always
    ports:
      - "8082:8082"
    deploy:
      mode: replicated
      replicas: 1
    environment:
      DSN: "host=postgres port=5432 user=postgres password=password dbname=users sslmode=disable timezone=UTC connect_timeout=5"
      MISTRAL_API_KEY: "${MISTRAL_API_KEY}"
      MAIL_SERVICE_URL: "http://mail-service/send"
      COMPLIANCE_SVC_URL: "http://ai-compliance-service:8083"
      ENCRYPTION_KEY: "${ENCRYPTION_KEY}"
      JWT_SECRET: "${JWT_SECRET}"
      GOOGLE_CLIENT_ID: "${GOOGLE_CLIENT_ID}"
      GOOGLE_CLIENT_SECRET: "${GOOGLE_CLIENT_SECRET}"
      GOOGLE_REDIRECT_URI: "${GOOGLE_REDIRECT_URI}"
      STRIPE_SECRET_KEY: "${STRIPE_SECRET_KEY}"
      STRIPE_WEBHOOK_SECRET: "${STRIPE_WEBHOOK_SECRET}"
      STRIPE_PRICE_STARTER: "${STRIPE_PRICE_STARTER}"
      STRIPE_PRICE_PRO: "${STRIPE_PRICE_PRO}"
      STRIPE_PRICE_BUSINESS: "${STRIPE_PRICE_BUSINESS}"
      FRONTEND_URL: "${FRONTEND_URL:-http://localhost}"
      MICROSOFT_CLIENT_ID: "${MICROSOFT_CLIENT_ID}"
      MICROSOFT_CLIENT_SECRET: "${MICROSOFT_CLIENT_SECRET}"
      PUBSUB_TOPIC: "${PUBSUB_TOPIC}"
      PUBSUB_SECRET: "${PUBSUB_SECRET}"
      RABBITMQ_URL: "amqp://guest:guest@rabbitmq"
      APP_BASE_URL: "https://api.quarantio.app"
      INTERNAL_SECRET: "${INTERNAL_SECRET}"

  ai-compliance-service:
    build:
      context: ./../ai-compliance-service
      dockerfile: ./../ai-compliance-service/ai-compliance-service.dockerfile
    restart: always
    ports:
      - "8083:8083"
    deploy:
      mode: replicated
      replicas: 1
    depends_on:
      rabbitmq:
        condition: service_healthy
      postgres:
        condition: service_started
    environment:
      DSN: "host=postgres port=5432 user=postgres password=password dbname=users sslmode=disable timezone=UTC connect_timeout=5"
      MISTRAL_API_KEY: "${MISTRAL_API_KEY}"
      MAIL_SERVICE_URL: "http://mail-service/send"
      ENCRYPTION_KEY: "${ENCRYPTION_KEY}"
      TENANT_SVC_URL: "http://tenant-service:8082"
      INTERNAL_SECRET: "${INTERNAL_SECRET}"

  postgres:
    image: 'pgvector/pgvector:pg14'
    ports:
      - "5432:5432"
    restart: always
    deploy:
      mode: replicated
      replicas: 1
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: "password"
      POSTGRES_DB: users
    volumes:
      - postgres_data:/var/lib/postgresql/data/

  redis:
    image: 'redis:7-alpine'
    ports:
      - "6379:6379"
    restart: always
    deploy:
      mode: replicated
      replicas: 1
    volumes:
      - ./db-data/redis/:/data

  mailhog:
    image: 'mailhog/mailhog'
    ports:
      - "1025:1025"
      - "8025:8025"

  rabbitmq:
    image: 'rabbitmq:3.13-alpine'
    ports:
      - "5672:5672"
    restart: always
    deploy:
      mode: replicated
      replicas: 1
    volumes:
      - ./db-data/rabbitmq/:/var/lib/rabbitmq/
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

volumes:
  postgres_data:
